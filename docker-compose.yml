services:
  life-balance:
    build:
      context: .
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    container_name: life-balance
    restart: unless-stopped
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lifebalance.rule=Host(`lifebalance.srv1493308.hstgr.cloud`)"
      - "traefik.http.routers.lifebalance.entrypoints=websecure"
      - "traefik.http.routers.lifebalance.tls.certresolver=letsencrypt"
      - "traefik.http.services.lifebalance.loadbalancer.server.port=80"

networks:
  web:
    external: true
